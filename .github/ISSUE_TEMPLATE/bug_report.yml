name: Bug Report
description: Report a reproducible problem in HeadlessX
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: ["saifyxpro"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Keep this report focused on one problem. If you can reproduce it with a small command or setup, include that directly.

  - type: checkboxes
    id: checks
    attributes:
      label: Before You Submit
      options:
        - label: I searched existing issues first
          required: true
        - label: I tested on the latest HeadlessX release or current `develop`
          required: true

  - type: input
    id: version
    attributes:
      label: HeadlessX Version
      placeholder: "v2.1.12 or develop"
    validations:
      required: true

  - type: dropdown
    id: install_mode
    attributes:
      label: Installation Mode
      options:
        - CLI developer
        - CLI self-host
        - CLI production
        - Docker compose only
        - Repo / local development
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - apps/web
        - apps/api
        - apps/yt-engine
        - packages/cli
        - infra/docker
        - infra/domain-setup
        - docs
        - other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What Happened
      description: Describe the problem in one short paragraph.
      placeholder: "After running `headlessx init --mode self-host`, the API container exited with..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest reliable reproduction.
      placeholder: |
        1. Run:
           headlessx init --mode self-host --branch develop
        2. Open:
           http://localhost:34872
        3. Run:
           headlessx status
        4. Observe:
           API health fails
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Result
      placeholder: "The stack should start and `headlessx doctor` should report the API as reachable."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs Or Error Output
      description: Paste only the relevant part.
      render: shell
      placeholder: |
        docker compose logs api --tail=200
        headlessx doctor

        <paste output here>

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, pnpm, Docker, and anything else relevant.
      placeholder: "Ubuntu 24.04, Node 22.x, pnpm 10.32.1, Docker 28.x"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant Config
      description: Sanitize secrets before pasting.
      render: shell
      placeholder: |
        API_HOST_PORT=38473
        WEB_HOST_PORT=34872
        REDIS_HOST_PORT=36379

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra Context
      placeholder: "Screenshots, workarounds, related issues, or anything else useful."

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I can help test a fix
        - label: I can open a PR
