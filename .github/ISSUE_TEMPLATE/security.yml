name: Security Report
description: Report a security issue responsibly
title: "[Security]: "
labels: ["security"]
assignees: ["saifyxpro"]

body:
  - type: markdown
    attributes:
      value: |
        Please do not post exploitable security details publicly.

        For anything sensitive, email `security@headlessx.dev` first.
        Use this public template only for low-risk reports, follow-up coordination, or non-exploitable hardening concerns.

  - type: checkboxes
    id: checks
    attributes:
      label: Responsible Disclosure
      options:
        - label: I understand public issues are visible immediately
          required: true
        - label: I am not posting secrets, credentials, or exploitable payloads here
          required: true
        - label: I will use private contact for sensitive or critical details
          required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - apps/web
        - apps/api
        - apps/yt-engine
        - packages/cli
        - infra/docker
        - infra/domain-setup
        - secrets or config handling
        - other
    validations:
      required: true

  - type: input
    id: affected_version
    attributes:
      label: Affected Version
      placeholder: "v2.1.12 or develop"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: "Short non-sensitive summary of the issue."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      placeholder: "What could an attacker or unauthorized user do if this issue were exploited?"
    validations:
      required: true

  - type: textarea
    id: safe_repro
    attributes:
      label: Safe Reproduction Notes
      description: Share only non-harmful steps or high-level context.
      placeholder: |
        - deployment mode
        - affected endpoint or surface
        - conditions required to trigger the issue
    validations:
      required: true

  - type: textarea
    id: mitigation
    attributes:
      label: Suggested Mitigation
      placeholder: "Optional fix ideas, defense-in-depth notes, or hardening suggestions."

  - type: input
    id: credit
    attributes:
      label: Credit Name
      description: Optional name or handle for credit after resolution.
