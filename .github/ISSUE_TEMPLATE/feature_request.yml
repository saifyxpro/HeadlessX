name: Feature Request
description: Propose a focused improvement for HeadlessX
title: "[Feature]: "
labels: ["enhancement", "feature-request"]
assignees: ["saifyxpro"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea.

        Keep this request concrete. The best feature reports explain the problem first, then the shape of the solution.

  - type: checkboxes
    id: checks
    attributes:
      label: Before You Submit
      options:
        - label: I searched existing issues and discussions first
          required: true
        - label: This request fits HeadlessX as a self-hosted operators platform
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Target Area
      options:
        - apps/web
        - apps/api
        - apps/yt-engine
        - packages/cli
        - infra/docker
        - infra/domain-setup
        - docs
        - global platform
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - Operator capability
        - CLI and install UX
        - Dashboard UX
        - API design
        - Docker or deployment
        - Performance
        - Documentation
        - Security
        - Developer experience
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: "Add a first-class `headlessx update` command for existing VPS installs."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem To Solve
      description: Explain the real workflow pain or missing capability.
      placeholder: |
        Today I have to manually pull the repo, rebuild Docker, and restart services.
        This makes updates slower and easier to get wrong.
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe how this should work from a user point of view.
      placeholder: |
        `headlessx update` should:
        - reuse the saved mode
        - pull the selected branch
        - preserve existing env files
        - tell me whether I need `headlessx restart`
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Or Workarounds
      placeholder: "Current manual steps, alternative command design, or other tools."

  - type: textarea
    id: use_cases
    attributes:
      label: Use Cases
      placeholder: |
        1. Update a VPS running `self-host`
        2. Refresh a production install without losing domain config
        3. Keep a local developer workspace aligned with `develop`
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I can help test this
        - label: I can help refine the UX
        - label: I can open a PR
