labels: ["announcement"]

body:
  - type: markdown
    attributes:
      value: |
        Use this for official HeadlessX announcements, releases, milestones, or operational notices.

  - type: input
    id: title
    attributes:
      label: Title
      placeholder: "HeadlessX v2.1.12 released"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: "What changed and why it matters."
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: Links
      placeholder: "Release notes, docs, migration guide, demo, or issue links."
