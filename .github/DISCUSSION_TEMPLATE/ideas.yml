labels: ["idea", "enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Use Discussions for early ideas before turning them into tracked issues.

  - type: input
    id: title
    attributes:
      label: Idea Title
      placeholder: "Add a better VPS update flow to the CLI"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Operators
        - CLI
        - Dashboard
        - API
        - Docker or deployment
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Or Opportunity
      placeholder: "What feels missing, painful, or worth improving?"
    validations:
      required: true

  - type: textarea
    id: direction
    attributes:
      label: Suggested Direction
      placeholder: "Describe the shape of the solution, not every implementation detail."

  - type: textarea
    id: context
    attributes:
      label: Extra Context
      placeholder: "Examples, screenshots, related tools, or workflow details."
