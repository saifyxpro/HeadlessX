labels: ["question"]

body:
  - type: markdown
    attributes:
      value: |
        Ask usage, setup, deployment, or troubleshooting questions here.

  - type: input
    id: topic
    attributes:
      label: Topic
      placeholder: "CLI self-host install on Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Installation and setup
        - CLI
        - Dashboard
        - API
        - Docker and VPS
        - Operators
        - Troubleshooting
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      placeholder: "What are you trying to do, what have you already tried, and where is it failing?"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "HeadlessX version, install mode, OS, Node, pnpm, Docker, and any relevant URLs or ports."

  - type: textarea
    id: logs
    attributes:
      label: Commands Or Logs
      render: shell
      placeholder: "Paste the relevant command, status output, or error log."
