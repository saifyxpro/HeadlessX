services:
  postgres:
    image: postgres:15-alpine
    container_name: headlessx-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-headlessx}
    ports:
      - "${POSTGRES_HOST_PORT:-35432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-headlessx}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network
    profiles: ["db", "all"]

  redis:
    image: redis:7-alpine
    container_name: headlessx-redis
    ports:
      - "${REDIS_HOST_PORT:-36379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network
    profiles: ["api", "queue", "all"]

  html-to-md:
    build:
      context: ../../
      dockerfile: apps/go-html-to-md-service/Dockerfile
    container_name: headlessx-html-to-md
    environment:
      - PORT=8080
    ports:
      - "${HTML_TO_MARKDOWN_HOST_PORT:-38081}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network
    profiles: ["api", "queue", "all"]

  yt-engine:
    build:
      context: ../../
      dockerfile: infra/docker/yt-engine.Dockerfile
    container_name: headlessx-yt-engine
    environment:
      - YT_ENGINE_PORT=${YT_ENGINE_PORT:-8090}
      - YT_ENGINE_TEMP_DIR=${YT_ENGINE_TEMP_DIR:-/app/tmp/yt-engine}
      - YT_ENGINE_JOB_TTL_HOURS=${YT_ENGINE_JOB_TTL_HOURS:-12}
    ports:
      - "${YT_ENGINE_HOST_PORT:-38090}:8090"
    volumes:
      - yt_engine_tmp:/app/tmp/yt-engine
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network
    profiles: ["api", "all"]

  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: headlessx-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      html-to-md:
        condition: service_healthy
      yt-engine:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-headlessx}?schema=public
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - HTML_TO_MARKDOWN_SERVICE_URL=${HTML_TO_MARKDOWN_SERVICE_URL:-http://html-to-md:8080}
      - HTML_TO_MARKDOWN_TIMEOUT_MS=${HTML_TO_MARKDOWN_TIMEOUT_MS:-60000}
      - PORT=${PORT:-8000}
      - HOST=${HOST:-0.0.0.0}
      - NODE_ENV=production
      - WEB_PORT=${WEB_PORT:-3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:34872}
      - DASHBOARD_INTERNAL_API_KEY=${DASHBOARD_INTERNAL_API_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - YT_ENGINE_URL=${YT_ENGINE_URL:-http://yt-engine:8090}
      - YT_ENGINE_TIMEOUT_MS=${YT_ENGINE_TIMEOUT_MS:-45000}
      - BROWSER_WINDOW_WIDTH=${BROWSER_WINDOW_WIDTH:-}
      - BROWSER_WINDOW_HEIGHT=${BROWSER_WINDOW_HEIGHT:-}
      - BULLMQ_QUEUE_NAME=${BULLMQ_QUEUE_NAME:-headlessx-jobs}
      - QUEUE_WORKER_CONCURRENCY=${QUEUE_WORKER_CONCURRENCY:-2}
      - QUEUE_JOB_ATTEMPTS=${QUEUE_JOB_ATTEMPTS:-3}
      - QUEUE_JOB_BACKOFF_MS=${QUEUE_JOB_BACKOFF_MS:-5000}
      - QUEUE_STREAM_POLL_MS=${QUEUE_STREAM_POLL_MS:-1000}
    ports:
      - "${API_HOST_PORT:-38473}:${PORT:-8000}"
    volumes:
      - ../../apps/api/models:/app/apps/api/models
      - browser_profile:/app/apps/api/data/browser-profile
    networks:
      - headlessx-network
    profiles: ["api", "all"]

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: headlessx-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      html-to-md:
        condition: service_healthy
    command: ["/usr/local/bin/headlessx-worker-entrypoint"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-headlessx}?schema=public
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - HTML_TO_MARKDOWN_SERVICE_URL=${HTML_TO_MARKDOWN_SERVICE_URL:-http://html-to-md:8080}
      - HTML_TO_MARKDOWN_TIMEOUT_MS=${HTML_TO_MARKDOWN_TIMEOUT_MS:-60000}
      - HOST=${HOST:-0.0.0.0}
      - NODE_ENV=production
      - DASHBOARD_INTERNAL_API_KEY=${DASHBOARD_INTERNAL_API_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - YT_ENGINE_URL=${YT_ENGINE_URL:-http://yt-engine:8090}
      - YT_ENGINE_TIMEOUT_MS=${YT_ENGINE_TIMEOUT_MS:-45000}
      - BROWSER_WINDOW_WIDTH=${BROWSER_WINDOW_WIDTH:-}
      - BROWSER_WINDOW_HEIGHT=${BROWSER_WINDOW_HEIGHT:-}
      - BULLMQ_QUEUE_NAME=${BULLMQ_QUEUE_NAME:-headlessx-jobs}
      - QUEUE_WORKER_CONCURRENCY=${QUEUE_WORKER_CONCURRENCY:-2}
      - QUEUE_JOB_ATTEMPTS=${QUEUE_JOB_ATTEMPTS:-3}
      - QUEUE_JOB_BACKOFF_MS=${QUEUE_JOB_BACKOFF_MS:-5000}
      - QUEUE_STREAM_POLL_MS=${QUEUE_STREAM_POLL_MS:-1000}
    volumes:
      - ../../apps/api/models:/app/apps/api/models
    networks:
      - headlessx-network
    profiles: ["queue", "all"]

  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
    container_name: headlessx-web
    depends_on:
      - api
    environment:
      - WEB_PORT=${WEB_PORT:-3000}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:8000}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:38473}
      - NODE_ENV=production
      - DASHBOARD_INTERNAL_API_KEY=${DASHBOARD_INTERNAL_API_KEY}
    ports:
      - "${WEB_HOST_PORT:-34872}:3000"
    networks:
      - headlessx-network
    profiles: ["web", "all"]

volumes:
  pgdata:
  browser_profile:
  yt_engine_tmp:

networks:
  headlessx-network:
    driver: bridge
