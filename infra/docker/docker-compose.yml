services:
  postgres:
    image: postgres:15-alpine
    container_name: headlessx-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-headlessx}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-headlessx}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network
    profiles: ["db", "all"]

  redis:
    image: redis:7-alpine
    container_name: headlessx-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network
    profiles: ["api", "queue", "all"]

  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: headlessx-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-headlessx}?schema=public
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PORT=${PORT:-8000}
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:${WEB_PORT:-3000}
      - DASHBOARD_INTERNAL_API_KEY=${DASHBOARD_INTERNAL_API_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - BULLMQ_QUEUE_NAME=${BULLMQ_QUEUE_NAME:-headlessx-jobs}
      - QUEUE_WORKER_CONCURRENCY=${QUEUE_WORKER_CONCURRENCY:-2}
      - QUEUE_JOB_ATTEMPTS=${QUEUE_JOB_ATTEMPTS:-3}
      - QUEUE_JOB_BACKOFF_MS=${QUEUE_JOB_BACKOFF_MS:-5000}
      - QUEUE_STREAM_POLL_MS=${QUEUE_STREAM_POLL_MS:-1000}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ../../apps/api/models:/app/apps/api/models
    networks:
      - headlessx-network
    profiles: ["api", "all"]

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: headlessx-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/usr/local/bin/headlessx-worker-entrypoint"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-headlessx}?schema=public
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - NODE_ENV=production
      - DASHBOARD_INTERNAL_API_KEY=${DASHBOARD_INTERNAL_API_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - BULLMQ_QUEUE_NAME=${BULLMQ_QUEUE_NAME:-headlessx-jobs}
      - QUEUE_WORKER_CONCURRENCY=${QUEUE_WORKER_CONCURRENCY:-2}
      - QUEUE_JOB_ATTEMPTS=${QUEUE_JOB_ATTEMPTS:-3}
      - QUEUE_JOB_BACKOFF_MS=${QUEUE_JOB_BACKOFF_MS:-5000}
      - QUEUE_STREAM_POLL_MS=${QUEUE_STREAM_POLL_MS:-1000}
    volumes:
      - ../../apps/api/models:/app/apps/api/models
    networks:
      - headlessx-network
    profiles: ["queue", "all"]

  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
    container_name: headlessx-web
    depends_on:
      - api
    environment:
      - INTERNAL_API_URL=http://api:${PORT:-8000}
      - NEXT_PUBLIC_API_URL=http://localhost:${PORT:-8000}
      - NODE_ENV=production
      - DASHBOARD_INTERNAL_API_KEY=${DASHBOARD_INTERNAL_API_KEY}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - headlessx-network
    profiles: ["web", "all"]

volumes:
  pgdata:

networks:
  headlessx-network:
    driver: bridge
